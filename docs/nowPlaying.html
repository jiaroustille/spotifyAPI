<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Now Playing</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2a2f3f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      overflow: hidden;
    }
    body {
        width: 400px;
    }
    .bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      box-sizing: border-box;
      width: 100%;
      height: 80px;
      background: #2a2f3f;
    }
    .cover {
      width: 56px;
      height: 56px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #333;
      overflow: hidden;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .meta {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      flex: 1;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist {
      font-size: 11px;
      color: #b3b3b3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-wrap {
      margin-top: 4px;
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress {
      height: 100%;
      background: hotpink;
      width: 0%;
      transition: width 0.3s linear;
    }
    .status {
      font-size: 10px;
      color: hotpink;
      white-space: nowrap;
    }
    .empty {
      font-size: 12px;
      color: #b3b3b3;
    }
  </style>
</head>
<body>
  <div class="bar" id="bar">
    <div class="empty">Loading…</div>
  </div>

  <script>
    const API_URL = "https://spotifyapi-a85s.onrender.com/now-playing"; 

    async function fetchNowPlaying() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        renderNowPlaying(data);
      } catch (e) {
        renderError();
      }
    }

    function msToPct(progress, duration) {
      if (!duration || duration <= 0) return 0;
      return Math.max(0, Math.min(100, (progress / duration) * 100));
    }

    function renderNowPlaying(data) {
      const bar = document.getElementById("bar");

      if (!data || !data.item || data.currently_playing_type !== "track") {
        bar.innerHTML = '<div class="empty">Nothing playing</div>';
        return;
      }

      const track = data.item;
      const img = track.album?.images?.[1]?.url || track.album?.images?.[0]?.url || "";
      const title = track.name || "Unknown track";
      const artist = (track.artists || []).map(a => a.name).join(", ") || "Unknown artist";
      const progressMs = data.progress_ms || 0;
      const durationMs = track.duration_ms || 0;
      const pct = msToPct(progressMs, durationMs);

      bar.innerHTML = `
        <div class="cover">
          ${img ? `<img src="${img}" alt="Album cover">` : ""}
        </div>
        <div class="meta">
          <div class="title" title="${title}">${title}</div>
          <div class="artist" title="${artist}">${artist}</div>
          <div class="progress-wrap">
            <div class="progress" style="width:${pct}%;"></div>
          </div>
        </div>
        <div class="status">${data.is_playing ? "Playing" : "Paused"}</div>
      `;
    }

    function renderError() {
      const bar = document.getElementById("bar");
      bar.innerHTML = '<div class="empty">Error loading now playing</div>';
    }

    fetchNowPlaying();
    setInterval(fetchNowPlaying, 5000);
  </script>
</body>
</html>
